<div class="page with-filter">
  <app-filter-panel
    [groups]="filterGroups"
    [state]="filterState"
    (stateChange)="filterState = $event"
    (clear)="filterState = {}"
  ></app-filter-panel>

  <div class="content">
    <div *ngFor="let exp of filteredExperiences" 
        class="experience-card" 
        [ngClass]="exp.type"
        (click)="toggleCard(exp)">

      <div class="card-header">
        <div class="type-label">{{ exp.type | titlecase }}</div>
        <h3>{{ exp.role }}</h3>
        <p><strong>{{ exp.organization }}</strong></p>
        <p>{{ exp.startDate }} to {{ exp.endDate }}</p>
        <div class="card-description" *ngIf="isExpanded(exp)">
          <markdown [data]="exp.description" />
        </div>
        <div class="tags">
          <span *ngFor="let t of exp.tags" class="tag">{{ t }}</span>
        </div>
        <span class="expand-hint" [class.expanded]="isExpanded(exp)">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 12 12">
            <polygon points="0,0 12,0 0,12" fill="currentColor"/>
          </svg>
        </span>
      </div>
    </div>
    <footer class="site-footer">
      <p>© 2026 Evan Brooks. All rights reserved.</p>
    </footer>
  </div>
</div>
